<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Fake News Detection</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            width:100%;
            height:100vh;
            background:#020B2D;
            overflow:hidden;
        }

        .container{
            display:flex;
            width:100%;
            height:100vh;
        }

        /* LEFT SECTION */
        .left-section{
            width:50%;
            height:100%;
            background:#020B2D;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            border-right:1px solid rgba(255,255,255,0.05);
        }

        .logo-box{
            width:100px;
            height:100px;
            background:linear-gradient(135deg,#7B2FF7,#F107A3);
            border-radius:25px;
            display:flex;
            justify-content:center;
            align-items:center;
            box-shadow:0 0 30px rgba(161, 66, 255, 0.6);
            margin-bottom:35px;
        }

        .logo-box i{
            font-size:45px;
            color:white;
        }

        .main-title{
            font-size:64px;
            color:white;
            font-weight:700;
        }

        .main-title span{
            color:#B026FF;
        }

        .subtitle{
            margin-top:20px;
            color:#d7d7d7;
            font-size:20px;
            font-weight:300;
        }

        /* RIGHT SECTION */
        .right-section{
            width:50%;
            height:100%;
            display:flex;
            
            justify-content:center;
            align-items:center;
            background:#00092A;
        }

        .register-card{
            width:430px;
            background:#0E1430;
            border-radius:25px;
            padding:45px;
            border:1px solid #ffffff;
            box-shadow:0 0 25px #ffffff98;
        }

        .register-card h1{
            color:white;
            font-size:42px;
            margin-bottom:10px;
        }

        .register-card p{
            color:#b6b6b6;
            margin-bottom:35px;
        }

        .input-box{
            width:100%;
            height:55px;
            background:#0B1436;
            border-radius:15px;
            margin-bottom:22px;
            display:flex;
            align-items:center;
            padding:0 18px;
            border:2px solid transparent;
            transition:0.3s;
        }

        .input-box:focus-within{
            border:2px solid #B026FF;
            box-shadow:0 0 15px rgba(176,38,255,0.5);
        }

        .input-box i{
            color:#B026FF;
            margin-right:12px;
            font-size:15px;
        }

        .input-box input{
            width:100%;
            background:none;
            border:none;
            outline:none;
            color:white;
            font-size:15px;
        }

        .input-box input::placeholder{
            color:#8d8d8d;
        }

        .register-btn{
            width:100%;
            height:55px;
            border:none;
            border-radius:15px;
            background:linear-gradient(90deg,#7B2FF7,#F107A3);
            color:white;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:10px;
        }

        .register-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 0 20px rgba(176,38,255,0.5);
        }

        .bottom-text{
            margin-top:25px;
            text-align:center;
            color:#bfbfbf;
            font-size:14px;
        }

        .bottom-text a{
            color:#B026FF;
            text-decoration:none;
            font-weight:600;
        }

        /* Dynamic Error Box Style */
        .alert-box {
            background:#ff4d4d;
            color:white;
            padding:12px;
            border-radius:10px;
            margin-bottom:20px;
            text-align:center;
            font-size:14px;
            font-weight:500;
        }

        /* RESPONSIVE */
        @media(max-width:1000px){
            .left-section{
                display:none;
            }
            .right-section{
                width:100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- LEFT -->
        <div class="left-section">
            <div class="logo-box">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="main-title">
                Fake News <span>Detection</span>
            </h1>
            <p class="subtitle">
                AI-Powered News Verification System with Explainability
            </p>
        </div>

        <!-- RIGHT -->
        <div class="right-section">
            <div class="register-card">
                <h1>Create Account</h1>
                <p>Register to continue</p>

                <!-- Server-side Error Display -->
                {% if error %}
                <div class="alert-box">
                    {{ error }}
                </div>
                {% endif %}

                <!-- Client-side JavaScript Error Container -->
                <div id="js-error-box" class="alert-box" style="display: none;"></div>

                <form id="registerForm" action="/register" method="POST">

                    <!-- Username Block (Checks for real characters, not just blank spaces) -->
                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" 
                               id="username"
                               name="username" 
                               placeholder="Enter username" 
                               pattern="[A-Za-z\s]+" 
                               title="Username cannot be empty or just spaces"
                               required>
                    </div>

                    <!-- Email Block -->
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" 
                               id="email"
                               name="email" 
                               placeholder="Enter your email" 
                               required>
                    </div>

                    <!-- Password Block (Enforces 8+ characters, 1 Uppercase, 1 Lowercase, 1 Number) -->
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" 
                               id="password"
                               name="password" 
                               placeholder="Enter password" 
                               pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-A1-Z]).{8,}$"
                               title="Password must be at least 8 characters long, contain at least one uppercase letter, one lowercase letter, and one number."
                               required>
                    </div>

                    <!-- Confirm Password Block -->
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" 
                               id="confirm_password"
                               name="confirm_password" 
                               placeholder="Confirm password" 
                               required>
                    </div>

                    <button type="submit" class="register-btn">
                        <i class="fa-solid fa-user-plus"></i>
                        Register
                    </button>

                </form>

                <div class="bottom-text">
                    Already have an account? 
                    <a href="/login">Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Security Validation Logic -->
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorBox = document.getElementById('js-error-box');

            // Reset client error container visibility
            errorBox.style.display = 'none';
            errorBox.innerText = '';

            // Strict matching validation rule
            if (password !== confirmPassword) {
                event.preventDefault(); // Halt form network submission
                errorBox.innerText = "Passwords do not match. Please verify your entries.";
                errorBox.style.display = 'block';
                
                // Scroll up smoothly to read error box if applicable
                errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });
    </script>

</body>
</html>
